# Smithery Configuration for Context Fabric
# https://smithery.ai/docs/registry/smithery-yaml

name: context-fabric
version: 0.13.0
description: |
  MCP server for agentic CLI memory and time-aware orientation. Provides a
  three-layer memory architecture (working / project / semantic), hybrid
  search (FTS5 BM25 + vector cosine + RRF, ANN-accelerated by bundled
  sqlite-vec), bi-temporal reasoning with supersession, structured
  provenance, cosine near-duplicate detection on store, procedural
  memory ("skills"), MCP Resources and Prompts, a code index with
  file-watching, and a built-in time engine with IANA timezone support.

  Integrates with Kimi, Claude Code, OpenCode, Codex, Gemini CLI, Cursor,
  and Claude Desktop. Fully local — no API keys required. Runs locally
  (Node.js 22.5+) or via Docker (cross-platform, zero host dependencies).

  v0.13 ships publicly reproducible retrieval numbers: nDCG@10 0.744 on
  BEIR SciFact, 0.380 on BEIR FiQA, Hit@5 0.952 on LongMemEval_S.

homepage: https://github.com/Abaddollyon/context-fabric
license: MIT

runtime:
  type: node
  version: ">=22.5.0"

installation:
  # From source
  method: source
  path: .
  build: npm run build
  start: node dist/server.js

  # Or via Docker (cross-platform)
  # docker build -t context-fabric .
  # docker run --rm -i -v context-fabric-data:/data/.context-fabric context-fabric

commands:
  start:
    description: Start the MCP server
    command: node dist/server.js

  build:
    description: Compile TypeScript
    command: npm run build

  test:
    description: Run test suite
    command: npm test

  bench:recall:
    description: Benchmark L3 recall latency (1K / 10K memories)
    command: npm run bench

  bench:quality:
    description: Measure recall@k and MRR against the golden query set
    command: npm run bench:quality

  bench:beir:scifact:
    description: BEIR SciFact — 5,183 docs, 300 queries. Reports nDCG@10 / Recall@100 / MRR@10.
    command: npm run bench:beir:scifact

  bench:beir:fiqa:
    description: BEIR FiQA-2018 — 57,638 docs, 648 queries. Reports nDCG@10 / Recall@100 / MRR@10.
    command: npm run bench:beir:fiqa

  bench:longmemeval:s:
    description: LongMemEval_S retrieval-only — 500 questions, Hit@k / Recall@k by question type.
    command: npm run bench:longmemeval:s

env:
  - name: CONTEXT_FABRIC_HOME
    description: Root storage directory for L2/L3 databases and config.yaml
    default: ~/.context-fabric
    required: false

  - name: FASTEMBED_CACHE_PATH
    description: ONNX model cache directory (pre-set in Docker image)
    required: false

  - name: CONTEXT_FABRIC_LOG_LEVEL
    description: Log verbosity — debug, info, warn, error
    default: info
    required: false

  - name: CONTEXT_FABRIC_DEFAULT_PROJECT
    description: Project path used when a tool call omits projectPath
    required: false

  - name: CONTEXT_FABRIC_EMBED_MODEL
    description: Embedding model. Any fastembed EmbeddingModel key (BGESmallEN, BGESmallENV15, BGEBaseEN, BGEBaseENV15, MLE5Large, AllMiniLML6V2, BGESmallZH). Case-insensitive.
    default: BGESmallENV15
    required: false

  - name: CONTEXT_FABRIC_EMBED_EP
    description: ONNX Runtime execution providers. Comma-separated (cpu, cuda, or a fallback chain like cuda,cpu). CUDA requires CUDA 12 libs on LD_LIBRARY_PATH.
    default: cpu
    required: false

  - name: CF_DISABLE_SQLITE_VEC
    description: Set to "1" to force the FTS5 prefilter path even if sqlite-vec is loaded.
    required: false

tools:
  # Core memory operations
  - name: context.store
    description: Store a memory (auto-routed by SmartRouter). Supports provenance, dedup (skip/merge/allow), and bi-temporal supersedes.
  - name: context.storeBatch
    description: Store an array of memories in one call. Same options as context.store, applied per-item.
  - name: context.recall
    description: Hybrid search (FTS5+vector+RRF, default), semantic (vector-only), or keyword (BM25-only). Supports asOf, includeSuperseded, offset pagination.
  - name: context.get
    description: Get a specific memory by id; searches L1 -> L2 -> L3.
  - name: context.update
    description: Update content, metadata, tags, weight, pinned, or promote across layers via targetLayer.
  - name: context.delete
    description: Delete a memory by id from whichever layer it lives in.
  - name: context.list
    description: List and paginate memories by layer/type/tags. Use stats:true for per-layer counts.
  - name: context.summarize
    description: Roll up old memories in L2/L3 into a single summary entry.

  # Orientation & time
  - name: context.orient
    description: "Session-start orientation: wall-clock time in a timezone, project path, offline-gap summary. Resolves date expressions and world-clock conversions."
  - name: context.getCurrent
    description: Current context window — working memories, relevant memories, patterns, suggestions, ghost messages.
  - name: context.reportEvent
    description: Report CLI events (file_opened, command_executed, error_occurred, ...) for auto-capture.

  # Code index
  - name: context.searchCode
    description: Text / symbol / semantic search over the local source index (FTS5-prefiltered semantic mode). Built + kept fresh by a file watcher.

  # Skills (v0.12 — procedural memory)
  - name: context.skill.create
    description: Create a skill (procedural memory) with slug, name, description, triggers, parameters, and an instructions body.
  - name: context.skill.list
    description: List skills, most-recently-used first, with optional search and trigger filter.
  - name: context.skill.get
    description: Fetch a skill by slug or id, with optional full instruction body.
  - name: context.skill.invoke
    description: Return a skill's instructions and record an invocation (updates invocationCount / lastInvokedAt).
  - name: context.skill.update
    description: Update a skill's name, description, triggers, parameters, or instructions.
  - name: context.skill.delete
    description: Delete a skill by slug or id.

  # Docs & ops
  - name: context.importDocs
    description: Seed memories from CLAUDE.md / AGENTS.md / README.md / CHANGELOG.md / CONTRIBUTING.md / ARCHITECTURE.md. Tag-dedup idempotent.
  - name: context.backup
    description: Online backup of L2 and L3 to a destination directory via VACUUM INTO (no downtime).
  - name: context.export
    description: Export memories as JSONL for migration or sharing.
  - name: context.import
    description: Import memories from a JSONL export.
  - name: context.metrics
    description: Structured server metrics (tool call counts, p50/p95 latencies, per-layer sizes).
  - name: context.health
    description: Readiness check + version + per-layer status + integrity flags.
  - name: context.setup
    description: Install Context Fabric into any supported MCP client (Claude Code, Cursor, Codex, OpenCode, Gemini, Kimi, Claude Desktop).

resources:
  - uri: memory://skills
    description: JSON list of every skill (id, slug, name, description, triggers, invocationCount, lastInvokedAt).
  - uri: memory://recent
    description: Recently-touched memories across all layers.
  - uri: memory://conventions
    description: Everything tagged "convention" — project coding/naming/style rules.
  - uri: memory://decisions
    description: Everything tagged "decision" — project architectural decisions (ADR-lite).
  - uriTemplate: memory://skill/{slug}
    description: A specific skill as Markdown (name, description, triggers, instruction body).
  - uriTemplate: memory://memory/{id}
    description: A specific memory by id as JSON.

prompts:
  - name: cf-orient
    description: Session-start orientation. Calls context.orient and summarizes what changed while offline.
  - name: cf-capture-decision
    description: Template for capturing an architectural decision with rationale/alternatives/tradeoffs.
  - name: cf-review-session
    description: End-of-session review — what got done, what's blocked, what to promote to L3.
  - name: cf-search-code
    description: Wrap context.searchCode with sensible defaults and formatted output.
  - name: cf-invoke-skill
    description: Fetch a skill and follow its instructions.

documentation:
  readme: README.md

  features:
    - Three-layer memory architecture (L1 in-memory / L2 SQLite per-project / L3 SQLite + vector, cross-project)
    - "Hybrid search: FTS5 BM25 + vector cosine + Reciprocal Rank Fusion. Query/passage instruction prefixes applied per embedder family. Sub-100ms p50 on 50K+ corpora."
    - Bundled sqlite-vec ANN acceleration (vec0 KNN, graceful FTS5 fallback)
    - Optional NVIDIA CUDA inference via CONTEXT_FABRIC_EMBED_EP=cuda (~30x ingest speedup)
    - Bi-temporal memory — supersedes / supersededBy / validFrom / validUntil + asOf recall filter
    - Provenance — structured citation block (sessionId, eventId, filePath, commitSha, sourceUrl, capturedAt)
    - Dedup-on-store — cosine near-duplicate detection at L3 (skip / merge / allow)
    - Skills — procedural memory agents can invoke (slug, triggers, parameters, instructions body)
    - MCP Resources & Prompts — browseable context + slash-command workflows
    - Time engine — IANA timezone support, natural-language date anchors, offline-gap detection
    - Local code indexing — symbol extraction, FTS5 + vector over chunks, live file-watching
    - Pattern detection and storage
    - Smart routing — auto-selects the optimal layer for each memory
    - Operational hardening — graceful shutdown with drain, WAL checkpoint on close, startup integrity check, explicit transactions on every multi-row write, VACUUM INTO backups
    - Public-benchmark harness — BEIR SciFact / FiQA and LongMemEval_S runners with published baselines
    - Zero external dependencies — node:sqlite, in-process ONNX embeddings (bge-small-en-v1.5, 384-d)
    - Self-installing — AI calls context.setup to configure any supported CLI

embedding:
  model: bge-small-en-v1.5
  dimension: 384
  runtime: fastembed-js (ONNX, in-process, no API calls). Swappable at startup via CONTEXT_FABRIC_EMBED_MODEL.
  benchmarks:
    BEIR SciFact (bge-base-en-v1.5, GPU): "nDCG@10 0.7439, Recall@100 0.9667"
    BEIR FiQA-2018 (bge-base-en-v1.5, GPU): "nDCG@10 0.3801, Recall@100 0.7361"
    LongMemEval_S (bge-base-en-v1.5, GPU): "Hit@5 0.9520, Recall@10 0.9472"

